name: Build Windows EXE

# pdf2ocr_gui.py から PDF2OCR.exe を Windows ランナーでビルドします。
#
# トリガー:
#   - v* のタグを push したとき（例: v1.2.1）→ ビルドして Release に添付
#   - 手動実行（Actions タブの "Run workflow"）→ ビルドして Artifact に保存
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller tkinterdnd2 pytesseract pillow pdf2image

      - name: exe をビルド
        run: >
          python -m PyInstaller --noconfirm --onefile --windowed
          --name PDF2OCR
          --collect-data tkinterdnd2
          pdf2ocr_gui.py

      - name: ビルド成果物を Artifact として保存
        uses: actions/upload-artifact@v4
        with:
          name: PDF2OCR-exe
          path: dist/PDF2OCR.exe
          if-no-files-found: error

      - name: タグ push 時は Release に添付
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF2OCR.exe
          generate_release_notes: true
